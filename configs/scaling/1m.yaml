# ~1M params - Smoke test / debug
vocab_size: 50257
d_model: 64
n_heads: 2
n_layers: 4
d_ff: 256
max_seq_len: 256
dropout: 0.1
batch_size: 16
learning_rate: 0.001
warmup_steps: 100
total_tokens: 10_000_000
mixed_precision: none
gradient_accumulation_steps: 1
eval_interval: 500
early_stopping_patience: 5

# --- STP ---
enable_stp: true
lambda_stp: 0.01
stp_num_triplets: 1
