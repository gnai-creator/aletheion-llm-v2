# ~250B params - Large frontier scale
# Params estimate: 12 * 80 * 16384^2 ≈ 258B
vocab_size: 50257
d_model: 16384
n_heads: 128
n_layers: 80
d_ff: 65536
max_seq_len: 4096
dropout: 0.0
batch_size: 1
learning_rate: 0.00008
warmup_steps: 2000
total_tokens: 5_000_000_000_000
mixed_precision: bf16
gradient_accumulation_steps: 512
gradient_checkpointing: true
distributed: true
fsdp: true
fsdp_sharding: full
compile_model: true
eval_interval: 500
early_stopping_patience: 10

# --- STP ---
enable_stp: true
lambda_stp: 0.01
stp_num_triplets: 1
