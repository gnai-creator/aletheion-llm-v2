# ~350M params - Backbone training (CE+STP) on RTX 4090 24GB
#
# Resume from step_105000 (4xH100 run) to complete 7B tokens.
# Remaining: ~118M tokens (~1,811 steps) — estimated ~3-4h in bf16.
#
# RTX 4090: 24GB VRAM
#   batch=4 por GPU com gradient_checkpointing
#   grad_accum=16 → effective batch = 4 * 1 * 16 = 64 (same as 4xH100)
#   bf16 mixed precision (backbone doesn't need fp32)
#
# Throughput estimado: ~8-10K tok/s

# --- Modelo ---
vocab_size: 50257
d_model: 1024
n_heads: 16
n_layers: 24
d_ff: 4096
max_seq_len: 1024
dropout: 0.1

# --- Tomography ---
enable_tomography: false  # Backbone = CE + STP only

# --- Training ---
batch_size: 4
learning_rate: 0.0003
weight_decay: 0.01
warmup_steps: 2000
grad_clip: 1.0
total_tokens: 7_000_000_000
log_interval: 50
eval_interval: 500
early_stopping_patience: 10
save_interval: 500

# --- Performance RTX 4090 (single GPU bf16) ---
mixed_precision: bf16
gradient_accumulation_steps: 16  # effective batch = 4 * 16 = 64
gradient_checkpointing: true     # 24GB requires it
compile_model: false
distributed: false
fsdp: false

# --- Data ---
data_dir: data/350m_rtx4090
streaming: false
num_workers: 4
prefetch_factor: 2

# --- STP ---
enable_stp: true
lambda_stp: 0.01
stp_num_triplets: 1

# --- Continual Learning ---
enable_ewc: true
ewc_lambda: 100.0
ewc_online: true
ewc_gamma: 0.9
ewc_fisher_samples: 256
enable_replay: true
replay_buffer_size: 10000
replay_mix_ratio: 0.1

# --- Logging ---
save_dir: checkpoints/350m_backbone_final
wandb_project: aletheion-v2-350m
save_total_limit: 5
