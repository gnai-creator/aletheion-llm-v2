# ~350M params - Fine-tuning epistemico em 4x H100 80GB
#
# Fase 2: Ativa as 14 losses + tomografia sobre backbone pre-treinado.
# Roda no mesmo pod do backbone para aproveitar o credito restante.
#
# Estrategia:
#   - lr 3x menor (1e-04) para nao destruir pesos do backbone
#   - Annealing 3x mais lento (warmup 30%, ramp ate 80%)
#   - Lambdas epistemicos a 10% do padrao, sobem com o annealing
#   - Lambda CE alto (1.5) para ancorar o backbone
#   - Gradient checkpointing ON (tomografia usa ~12GB extra por GPU)
#   - batch=4 por GPU, grad_accum=4 -> effective batch = 4*4*4 = 64
#
# Estimativa 4x H100:
#   Throughput: ~40-60K tok/s (tomografia ativa = 3x mais lento que backbone)
#   Tempo: ~5-7h para 1B tokens
#   Custo: ~$35-49 @ $7/hr

# --- Modelo (mesmo do backbone) ---
vocab_size: 50257
d_model: 1024
n_heads: 16
n_layers: 24
d_ff: 4096
max_seq_len: 1024
dropout: 0.05  # menor que treino original (0.1) - modelo ja generaliza

# --- Tomography ---
enable_tomography: true  # ATIVA - todas as 14 losses

# --- Training ---
batch_size: 4
learning_rate: 0.0001          # 3x menor que backbone (0.0003)
weight_decay: 0.01
warmup_steps: 500              # warmup curto - optimizer states ja estabilizados
grad_clip: 0.5                 # mais conservador para proteger backbone
total_tokens: 1_000_000_000    # 1B tokens (~14% do dataset, suficiente)
log_interval: 50
eval_interval: 500
early_stopping_patience: 5     # para rapido se CE subir
save_interval: 500             # checkpoints frequentes para rollback

# --- Performance 4x H100 ---
mixed_precision: bf16
gradient_accumulation_steps: 4  # effective batch = 4 * 4 GPUs * 4 accum = 64
gradient_checkpointing: true    # obrigatorio - tomografia usa muita VRAM
compile_model: false
distributed: true
dist_backend: nccl
fsdp: false                     # DDP suficiente para 350M

# --- Annealing conservador ---
loss_warmup_fraction: 0.30     # 30% dos steps so CE (protege backbone)
loss_ramp_fraction: 0.80       # ramp gradual ate 80% dos steps

# --- Lambdas (10% do padrao) ---
lambda_ce: 1.5                 # ALTO - ancora o backbone
lambda_stp: 0.01               # padrao (ativo desde step 0)
lambda_varo: 0.01              # padrao: 0.1
lambda_vi: 0.001               # padrao: 0.01
lambda_mad: 0.005              # padrao: 0.05
lambda_metric_reg: 0.0001      # padrao: 0.001
lambda_eidos: 0.0005           # padrao: 0.005
lambda_conflict: 0.0005        # padrao: 0.005
lambda_consciousness: 0.0003   # padrao: 0.003
lambda_grounding: 0.0005       # padrao: 0.005
lambda_plasticity: 0.0002      # padrao: 0.002
lambda_frontier: 0.0002        # padrao: 0.002
lambda_mopsi: 0.0003           # padrao: 0.003
lambda_contrastive: 0.0003     # padrao: 0.003

# --- Data ---
data_dir: data/350m_rtx4090
streaming: false
num_workers: 8
prefetch_factor: 4

# --- STP ---
enable_stp: true
stp_num_triplets: 1

# --- Continual Learning ---
enable_ewc: true
ewc_lambda: 200.0              # 2x padrao - protege mais o backbone
ewc_online: true
ewc_gamma: 0.9
ewc_fisher_samples: 256
enable_replay: true
replay_buffer_size: 10000
replay_mix_ratio: 0.1

# --- Logging ---
save_dir: checkpoints/350m_epistemic_finetune
wandb_project: aletheion-v2-350m
save_total_limit: 10
