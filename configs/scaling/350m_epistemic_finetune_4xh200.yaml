# ~350M params - Fine-tuning epistemico em 4x H200 SXM 141GB
#
# Fase 2: Ativa as 14 losses + tomografia sobre backbone pre-treinado.
#
# H200 SXM: 141GB VRAM por GPU (vs 80GB H100)
#   - batch=16 por GPU com folga (~70GB VRAM estimada)
#   - grad_accum=1 (sem overhead de acumulacao)
#   - gradient_checkpointing OFF (141GB da para tudo em memoria)
#   - effective batch = 16 * 4 * 1 = 64
#
# Estimativa 4x H200:
#   Throughput: ~80-120K tok/s
#   Tempo: ~2-3h para 1B tokens
#   Custo: ~$29-43 @ $14.36/hr

# --- Modelo (mesmo do backbone) ---
vocab_size: 50257
d_model: 1024
n_heads: 16
n_layers: 24
d_ff: 4096
max_seq_len: 1024
dropout: 0.05

# --- Tomography ---
enable_tomography: true

# --- Training ---
batch_size: 16
learning_rate: 0.0001
weight_decay: 0.01
warmup_steps: 500
grad_clip: 0.3  # mais agressivo para prevenir NaN em bf16
total_tokens: 1_000_000_000
log_interval: 50
eval_interval: 500
early_stopping_patience: 5
save_interval: 500

# --- Performance 4x H200 ---
mixed_precision: bf16
gradient_accumulation_steps: 1  # effective batch = 16 * 4 GPUs * 1 = 64
gradient_checkpointing: false   # 141GB VRAM = sem necessidade
compile_model: false            # DDP incompativel com tomografia
distributed: true
dist_backend: nccl
fsdp: false

# --- Annealing conservador ---
loss_warmup_fraction: 0.30
loss_ramp_fraction: 0.80

# --- Lambdas (2.5% do padrao — ultra conservador para estabilidade bf16) ---
lambda_ce: 1.5
lambda_stp: 0.0025
lambda_varo: 0.0025
lambda_vi: 0.00025
lambda_mad: 0.00125
lambda_metric_reg: 0.0  # disabled — eigvalsh causes NaN on ill-conditioned G
lambda_eidos: 0.000125
lambda_conflict: 0.000125
lambda_consciousness: 0.000075
lambda_grounding: 0.000125
lambda_plasticity: 0.00005
lambda_frontier: 0.00005
lambda_mopsi: 0.000075
lambda_contrastive: 0.000075

# --- Data ---
data_dir: data/350m_rtx4090
streaming: false
num_workers: 8
prefetch_factor: 4

# --- STP ---
enable_stp: true
stp_num_triplets: 1

# --- Continual Learning ---
enable_ewc: true
ewc_lambda: 200.0
ewc_online: true
ewc_gamma: 0.9
ewc_fisher_samples: 256
enable_replay: true
replay_buffer_size: 10000
replay_mix_ratio: 0.1

# --- Logging ---
save_dir: checkpoints/350m_epistemic_finetune
wandb_project: aletheion-v2-350m
save_total_limit: 5
