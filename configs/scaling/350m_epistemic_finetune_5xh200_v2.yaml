# ~350M params - Epistemic Fine-tuning v2 on 5x H200 SXM 141GB - FP32
#
# Full epistemic fine-tuning from scratch (1B tokens).
# Includes all NaN fixes from v1:
#   - Frobenius metric_regularization (replaced eigvalsh backward)
#   - STP norm guard (skip near-zero cosine_similarity)
#   - SKIP-GRAD: discard optimizer step if grad_norm is NaN/Inf
#   - grad_clip: 0.5 (reduced for stability)
#   - lambda_decay_k: 0.0001 (suave, tomografia presente até ~2/3 do treino)
#
# 5x H200 SXM: 141GB VRAM per GPU
#   batch=14 per GPU, grad_accum=1
#   effective batch = 14 * 5 * 1 = 70
#   fp32 full (eliminates bf16 overflow in tomography backward)
#
# Estimate:
#   tokens_per_step = 14 * 5 * 1024 = 71,680
#   total_steps = 1B / 71,680 = 13,950
#   Throughput: ~50-60K tok/s
#   Time: ~4.5-5.5h
#   Cost: ~$17.95/hr * 5.5h ≈ $99 (5x H200 SXM on RunPod)

# --- Modelo ---
vocab_size: 50257
d_model: 1024
n_heads: 16
n_layers: 24
d_ff: 4096
max_seq_len: 1024
dropout: 0.05

# --- Tomography ---
enable_tomography: true

# --- Training ---
batch_size: 14
learning_rate: 0.00005
weight_decay: 0.01
warmup_steps: 100
grad_clip: 0.5
total_tokens: 1_000_000_000
log_interval: 50
eval_interval: 500
early_stopping_patience: 5
save_interval: 500

# --- Performance 5x H200 fp32 ---
mixed_precision: "no"
gradient_accumulation_steps: 1
gradient_checkpointing: false
compile_model: false
distributed: true
dist_backend: nccl
fsdp: false

# --- Annealing ---
loss_warmup_fraction: 0.30
loss_ramp_fraction: 0.80

# --- Lambdas ---
lambda_ce: 1.5
lambda_stp: 0.01
lambda_varo: 0.01
lambda_vi: 0.001
lambda_mad: 0.005
lambda_metric_reg: 0.001
lambda_eidos: 0.0005
lambda_conflict: 0.0005
lambda_consciousness: 0.0003
lambda_grounding: 0.0005
lambda_plasticity: 0.0002
lambda_frontier: 0.0002
lambda_mopsi: 0.0003
lambda_contrastive: 0.0003

# --- Lambda Decay (exponential) ---
# k=0.0001 (suave): lambdas retêm ~61% no step 5K, ~25% no final
# k=0.0003 (agressivo): lambdas caem 78% já no step 5K
lambda_decay_mode: exponential
lambda_decay_k: 0.0001

# --- Data ---
data_dir: data/350m_rtx4090
streaming: false
num_workers: 8
prefetch_factor: 4

# --- STP ---
enable_stp: true
stp_num_triplets: 1

# --- Continual Learning ---
enable_ewc: false
enable_replay: false

# --- Logging ---
save_dir: checkpoints/350m_epistemic_finetune
wandb_project: aletheion-v2-350m
save_total_limit: 5
