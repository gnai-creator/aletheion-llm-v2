# ~350M params - Fine-tuning epistemico em RTX 4090 24GB
#
# Fase 3: Tomografia completa em fp32 full (sem mixed precision).
# fp32 elimina overflow bf16 que causava NaN na tomografia.
#
# RTX 4090: 24GB VRAM
#   - batch=2 por GPU com gradient_checkpointing
#   - grad_accum=32 → effective batch = 2 * 1 * 32 = 64
#   - gradient_checkpointing ON (24GB requer)
#
# Estimativa RTX 4090 fp32:
#   Throughput: ~5-8K tok/s
#   Tempo: ~8-12h para 280M tokens restantes

# --- Modelo ---
vocab_size: 50257
d_model: 1024
n_heads: 16
n_layers: 24
d_ff: 4096
max_seq_len: 1024
dropout: 0.05

# --- Tomography ---
enable_tomography: true

# --- Training ---
batch_size: 2
learning_rate: 0.00005  # lower for stability in fp32 fine-tuning
weight_decay: 0.01
warmup_steps: 100
grad_clip: 1.0  # fp32 doesn't need aggressive clipping
total_tokens: 1_000_000_000
log_interval: 50
eval_interval: 500
early_stopping_patience: 5
save_interval: 500

# --- Performance RTX 4090 (single GPU fp32) ---
mixed_precision: "no"
gradient_accumulation_steps: 32  # effective batch = 2 * 32 = 64
gradient_checkpointing: true     # 24GB requires it
compile_model: false
distributed: false
fsdp: false

# --- Annealing ---
loss_warmup_fraction: 0.30
loss_ramp_fraction: 0.80

# --- Lambdas (10% do padrao — fp32 pode aguentar mais) ---
lambda_ce: 1.5
lambda_stp: 0.01
lambda_varo: 0.01
lambda_vi: 0.001
lambda_mad: 0.005
lambda_metric_reg: 0.001  # fp32 handles eigvalsh fine
lambda_eidos: 0.0005
lambda_conflict: 0.0005
lambda_consciousness: 0.0003
lambda_grounding: 0.0005
lambda_plasticity: 0.0002
lambda_frontier: 0.0002
lambda_mopsi: 0.0003
lambda_contrastive: 0.0003

# --- Lambda Decay (exponential) ---
lambda_decay_mode: exponential
lambda_decay_k: 0.0003

# --- Data ---
data_dir: data/350m_rtx4090
streaming: false
num_workers: 4
prefetch_factor: 2

# --- STP ---
enable_stp: true
stp_num_triplets: 1

# --- Continual Learning ---
enable_ewc: false
enable_replay: false

# --- Logging ---
save_dir: checkpoints/350m_epistemic_finetune
wandb_project: aletheion-v2-350m
save_total_limit: 5
