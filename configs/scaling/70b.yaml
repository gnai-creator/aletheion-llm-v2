# ~70B params - Llama-2-70B equivalent
vocab_size: 50257
d_model: 8192
n_heads: 64
n_layers: 80
d_ff: 28672
max_seq_len: 4096
dropout: 0.0
batch_size: 1
learning_rate: 0.00015
warmup_steps: 2000
total_tokens: 2_000_000_000_000
mixed_precision: bf16
gradient_accumulation_steps: 128
gradient_checkpointing: true
distributed: true
fsdp: true
fsdp_sharding: full
compile_model: true
eval_interval: 500
early_stopping_patience: 10

# --- STP ---
enable_stp: true
lambda_stp: 0.01
stp_num_triplets: 1
